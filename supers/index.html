<!DOCTYPE html>

<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>Heroes vs Villains</title>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<link href="https://fonts.googleapis.com/css?family=Squada+One|Source+Code+Pro|Merriweather:300|Abril+Fatface" rel="stylesheet">

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">

<link rel="stylesheet" href="../inc/standard.css">


<link rel="icon" type="image/x-icon" href="img/favicon.png">

<style> 

.head
    {
         position: relative;
         background-size: cover;
         background-image: url('img/supersbk.jpg');
         background-position: center;
         min-height: 400px;
        }

.hv-container {
  display: flex;
  position: relative;
  background: #0b0b0b;
  color: #fff;
  font-family: Arial, sans-serif;
  min-height: 480px;
  overflow: hidden;
}

.hv-side {
  width: 50%;
  padding: 20px;
  text-align: center;
}

.villain {
  background: linear-gradient(135deg, #2b0000, #000);
}

.hero {
  background: linear-gradient(135deg, #001a33, #000);
}

.divider {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  font-size: 500px;
  pointer-events: none;
  text-shadow: 0 0 15px #ffd700;
}

.thumbnails {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 15px;
}

.thumbnails img {
  width: 50px;
  height: 50px;
  object-fit: cover;
  cursor: pointer;
  border: 2px solid transparent;
  border-radius: 6px;
  transition: 0.2s;
}

.thumbnails img:hover {
  border-color: #ffd700;
}

.main-img {
  width: 220px;
  max-width: 100%;
  margin: 10px auto;
  display: block;
  filter: drop-shadow(0 0 12px rgba(0,0,0,0.7));
}

.stats {
  margin-top: 15px;
  background: rgba(0,0,0,0.4);
  padding: 12px;
  border-radius: 8px;
}

.stats h3 {
  margin-bottom: 8px;
  color: #ffd700;
}


</style>

</head><body>

<div class="cont">

    <div id="head"><div class="block"><a href="../index.html" class="not"><div class="ban">TwidGrid</div></a><span class="ban">&#160> Heroes vs Villains</span></div></div>

<div class="head">
<div class="block" style="padding-top: 79px;">
<h3>Heroes vs Villains</h3><span class="fo-5">Every Hero Needs a Villain.</span>
<p></p><p></p>




</div></div>



<div class="block-978" style="padding-bottom: 59px;">


<div style="padding-top: 36px;">



</div>

    
<div class="hv-container">
  <!-- Villain Side -->
  <div class="hv-side villain">
    <div class="thumbnails">
      <img src="https://i.imgur.com/9Xn1KpR.png" onclick="changeCharacter('villain', this)" data-name="Dark Lord" data-power="95" data-speed="70" data-intel="90">
      <img src="https://i.imgur.com/3QZ5F9B.png" onclick="changeCharacter('villain', this)" data-name="Night Reaper" data-power="85" data-speed="80" data-intel="75">
    </div>

    <img id="villain-main" class="main-img" src="https://i.imgur.com/9Xn1KpR.png" alt="Villain">

    <div class="stats">
      <h3 id="villain-name">Dark Lord</h3>
      <p>Power: <span id="villain-power">95</span></p>
      <p>Speed: <span id="villain-speed">70</span></p>
      <p>Intelligence: <span id="villain-intel">90</span></p>
    </div>
  </div>

  <!-- Lightning Divider -->
  <div class="divider">⚡</div>

  <!-- Hero Side -->
  <div class="hv-side hero">
    <div class="thumbnails">
      <img src="https://i.imgur.com/8Km9tLL.png" onclick="changeCharacter('hero', this)" data-name="Solar Knight" data-power="90" data-speed="85" data-intel="80">
      <img src="https://i.imgur.com/yG3Wb3N.png" onclick="changeCharacter('hero', this)" data-name="Sky Sentinel" data-power="80" data-speed="95" data-intel="85">
    </div>

    <img id="hero-main" class="main-img" src="https://i.imgur.com/8Km9tLL.png" alt="Hero">

    <div class="stats">
      <h3 id="hero-name">Solar Knight</h3>
      <p>Power: <span id="hero-power">90</span></p>
      <p>Speed: <span id="hero-speed">85</span></p>
      <p>Intelligence: <span id="hero-intel">80</span></p>
    </div>
  </div>
</div>



</div>

</div>

<a href="#" id="back-to-top" title="Back to top">↑</a>

<script>
window.addEventListener('scroll', function() {
    let backToTop = document.getElementById('back-to-top');
    
    if (window.scrollY > 300) { // Show button after scrolling 300px
        backToTop.style.display = 'block';
    } else {
        backToTop.style.display = 'none';
    }
});

document.getElementById('back-to-top').addEventListener('click', function(e) {
    e.preventDefault();
    window.scrollTo({ top: 0, behavior: 'smooth' }); // Smooth scroll to top
});
</script>

<footer class="foot">

    <div class="block fo-1">
        TwidGrid is a small web development studio based in Central Malta.<p><a class="btn-4" href="../contact.html">Contact Us</a></p>
        <p>&copy; <span id="current-year"></span> TwidGrid. Est Malta.</p>
    </div>
</footer>

<script>
function changeCharacter(type, thumb) {
  document.getElementById(type + '-main').src = thumb.src;

  document.getElementById(type + '-name').textContent = thumb.dataset.name;
  document.getElementById(type + '-power').textContent = thumb.dataset.power;
  document.getElementById(type + '-speed').textContent = thumb.dataset.speed;
  document.getElementById(type + '-intel').textContent = thumb.dataset.intel;
}
</script>


</body>
</html>
